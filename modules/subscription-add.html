<div class="subscription-container">
  <div class="subscription-header">
    <h1>Add New Subscription / License</h1>
  </div>

  <form id="subscriptionForm" onsubmit="event.preventDefault(); submitSubscription();">
    <!-- First Row: Category, Start Date, Expiry Date -->
    <div class="form-row-three">
      <div class="form-group">
        <label>Category:</label>
        <select id="subCategory" onchange="handleSubscriptionCategoryChange()" required>
          <option value="">Select Category</option>
          <option value="add-new">+ Add New Category</option>
        </select>
      </div>

      <div class="form-group">
        <label>Purchase/Start Date:</label>
        <input type="date" id="startDate" required>
      </div>

      <div class="form-group">
        <label>Expiry/Renewal Date:</label>
        <input type="date" id="expiryDate" required>
      </div>
    </div>

    <!-- Add New Category Fields (Hidden by default) -->
    <div id="addNewCategoryFields" style="display: none;">
      <div class="form-row-two">
        <div class="form-group">
          <label>Category Name:</label>
          <input type="text" id="categoryName" placeholder="e.g., Software License">
        </div>
        <div class="form-group">
          <label>Main Code:</label>
          <input type="text" id="categoryCode" readonly placeholder="Auto-generated">
        </div>
      </div>
      <div class="form-group">
        <label>Description:</label>
        <textarea id="categoryDescription" placeholder="Category description" rows="2"></textarea>
      </div>
    </div>

    <!-- Second Row: Name, Vendor, License Code -->
    <div class="form-row-three">
      <div class="form-group">
        <label>Subscription/License Name:</label>
        <input type="text" id="subName" placeholder="e.g., Microsoft 365 Business Premium" required>
      </div>
      <div class="form-group">
        <label>Vendor/Provider:</label>
        <input type="text" id="vendor" placeholder="e.g., Microsoft, Google, GoDaddy">
      </div>
      <div class="form-group">
        <label>License Code:</label>
        <div class="code-display" id="generatedCodeDisplay">
          <span class="code-placeholder">-</span>
        </div>
        <input type="hidden" id="licenseCode">
      </div>
    </div>

    <!-- Third Row: Annual Cost, Payment Mode, Payment Frequency -->
    <div class="form-row-three">
      <div class="form-group">
        <label>Annual Cost (GH₵):</label>
        <input type="number" id="annualCost" step="0.01" placeholder="0.00" required>
      </div>
      <div class="form-group">
        <label>Payment Mode:</label>
        <select id="paymentMode">
          <option value="Prepaid">Prepaid</option>
          <option value="In Arrears">In Arrears</option>
        </select>
      </div>
      <div class="form-group">
        <label>Payment Frequency:</label>
        <select id="paymentFrequency">
          <option value="Monthly">Monthly</option>
          <option value="Quarterly">Quarterly</option>
          <option value="Semi-Annually">Semi-Annually (6 months)</option>
          <option value="Annually">Annually (1 Year)</option>
          <option value="2 Years">Bi-Annually (2 Years)</option>
          <option value="3 Years">Tri-Annually (3 Years)</option>
          <option value="5 Years">5 Years</option>
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="submit-btn">Save Subscription</button>
      <button type="button" class="reset-btn" onclick="resetSubscriptionForm()">Reset</button>
    </div>
  </form>
</div>

<div id="subToast" class="sub-toast" style="display: none;">
  <span id="subToastMessage"></span>
</div>
