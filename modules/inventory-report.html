<div class="inventory-report-container">
  <div class="report-header">
    <h1>Inventory Management</h1>
  </div>

  <!-- Tabs and Controls Row -->
  <div class="report-controls-row">
    <!-- Tabs on the left -->
    <div class="report-tabs">
      <button class="tab-btn active" onclick="switchInventoryTab('inventoryList')">
        <i class="fas fa-list"></i> Inventory List
      </button>
      <button class="tab-btn" onclick="switchInventoryTab('purchaseReport')">
        <i class="fas fa-shopping-cart"></i> Purchase
      </button>
      <button class="tab-btn" onclick="switchInventoryTab('usageReport')">
        <i class="fas fa-box-open"></i> Usage
      </button>
    </div>

    <!-- Controls on the right -->
    <div class="report-controls">
      <!-- Inventory List Controls -->
      <div class="control-group" id="inventoryControls" style="display: flex;">
        <div class="compact-date-input">
          <label for="inventoryToDate">As At:</label>
          <input type="date" id="inventoryToDate" onchange="loadInventoryList()">
        </div>
        <button class="print-report-btn" onclick="printUtils.printInventoryReport('inventoryList')">
          <i class="fas fa-print"></i> Print
        </button>
      </div>

      <!-- Purchase Report Controls -->
      <div class="control-group" id="purchaseControls" style="display: none;">
        <div class="compact-date-input">
          <label for="purchaseFromDate">From:</label>
          <input type="date" id="purchaseFromDate" onchange="loadPurchaseReport()">
        </div>
        <div class="compact-date-input">
          <label for="purchaseToDate">To:</label>
          <input type="date" id="purchaseToDate" onchange="loadPurchaseReport()">
        </div>
        <button class="print-report-btn" onclick="printUtils.printInventoryReport('purchaseReport')">
          <i class="fas fa-print"></i> Print
        </button>
      </div>

      <!-- Usage Report Controls -->
      <div class="control-group" id="usageControls" style="display: none;">
        <div class="compact-date-input">
          <label for="usageFromDate">From:</label>
          <input type="date" id="usageFromDate" onchange="loadUsageReport()">
        </div>
        <div class="compact-date-input">
          <label for="usageToDate">To:</label>
          <input type="date" id="usageToDate" onchange="loadUsageReport()">
        </div>
        <button class="print-report-btn" onclick="printUtils.printInventoryReport('usageReport')">
          <i class="fas fa-print"></i> Print
        </button>
      </div>
    </div>
  </div>

  <!-- Inventory List Tab (First/Active) -->
  <div class="tab-content active" id="inventoryList">
    <div class="report-table-wrapper" id="inventoryListTable">
      <table class="report-table">
        <thead>
          <tr>
            <th>Code</th>
            <th>Category</th>
            <th>Description</th>
            <th>Qty</th>
            <th>Unit Cost</th>
            <th>Total Cost</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="inventoryListTableBody">
          <tr>
            <td colspan="7" class="loading-cell">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Purchase Report Tab -->
  <div class="tab-content" id="purchaseReport">
    <div class="report-table-wrapper" id="purchaseReportTable">
      <table class="report-table">
        <thead>
          <tr>
            <th>Code</th>
            <th>Category</th>
            <th>Description</th>
            <th>Total Cost</th>
            <th>Qty</th>
            <th>Unit Cost</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="purchaseTableBody">
          <tr>
            <td colspan="7" class="loading-cell">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Usage Report Tab -->
  <div class="tab-content" id="usageReport">
    <div class="report-table-wrapper" id="usageReportTable">
      <table class="report-table">
        <thead>
          <tr>
            <th>Code</th>
            <th>Category</th>
            <th>Description</th>
            <th>Qty Used</th>
            <th>Unit Cost</th>
            <th>Usage Cost</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="usageTableBody">
          <tr>
            <td colspan="7" class="loading-cell">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Action Dropdown Portal -->
  <div class="action-dropdown-portal" id="inventoryActionPortal" style="display: none;"></div>
</div>

<!-- Record Usage Modal (compact) -->
<div class="usage-modal" id="usageModal" style="display: none;">
  <div class="usage-modal-content">
    <div class="usage-modal-header">
      <h2>Record Usage</h2>
      <button class="usage-modal-close" onclick="closeUsageModal()">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="usage-modal-body">
      <div class="modal-grid">
        <div class="modal-field">
          <label>Code:</label>
          <p id="usageItemCode" class="modal-value"></p>
        </div>
        <div class="modal-field">
          <label>Category:</label>
          <p id="usageItemName" class="modal-value"></p>
        </div>
      </div>
      <div class="modal-field full-width">
        <label>Description:</label>
        <p id="usageItemDescription" class="modal-value"></p>
      </div>
      <div class="modal-grid">
        <div class="modal-field">
          <label>Available:</label>
          <p id="usageItemQuantity" class="modal-value"></p>
        </div>
        <div class="modal-field">
          <label>Unit Cost:</label>
          <p id="usageItemUnitCost" class="modal-value"></p>
        </div>
      </div>
      <form id="usageForm" onsubmit="event.preventDefault(); submitUsageRecord();">
        <div class="modal-field full-width">
          <label for="quantityUsedInput">Quantity Used:</label>
          <input type="number" id="quantityUsedInput" step="1" min="1" placeholder="Enter quantity" required>
        </div>
        <div class="modal-grid">
          <div class="modal-field">
            <label>Unit Cost:</label>
            <p id="usageCostUnitPrice" class="modal-value"></p>
          </div>
          <div class="modal-field">
            <label>Usage Cost:</label>
            <p id="usageCostDisplay" class="modal-value">0.00</p>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="modal-btn-cancel" onclick="closeUsageModal()">Cancel</button>
          <button type="submit" class="modal-btn-save">Record</button>
        </div>
      </form>
    </div>
  </div>
</div>
