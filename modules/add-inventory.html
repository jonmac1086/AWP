<div class="inventory-container">
  <div class="inventory-header">
    <h1>Add New Inventory</h1>
  </div>

  <!-- New Inventory Form -->
  <form id="newInventoryForm" onsubmit="event.preventDefault(); submitNewInventory();">
    <!-- First Row: Category, Date, Inventory Code -->
    <div class="form-row-three">
      <div class="form-group">
        <label for="newCategory">Category:</label>
        <select id="newCategory" onchange="handleNewCategoryChange()">
          <option value="">Select Category</option>
          <option value="add-new">+ Add New</option>
        </select>
      </div>

      <div class="form-group">
        <label for="newDateOfPurchase">Date:</label>
        <input type="date" id="newDateOfPurchase" required>
      </div>

      <div class="form-group">
        <label>Inventory Code:</label>
        <div class="code-display" id="generatedCodeDisplay">
          <span class="code-placeholder">-</span>
        </div>
      </div>
    </div>

    <!-- Add New Category Fields (Hidden by default) -->
    <div id="addNewCategoryFields" style="display: none;">
      <div class="form-row-two">
        <div class="form-group">
          <label for="categoryName">Category Name:</label>
          <input type="text" id="categoryName" placeholder="e.g., Blue Pen">
        </div>
        <div class="form-group">
          <label for="categoryCode">Main Code:</label>
          <input type="text" id="categoryCode" readonly placeholder="Auto-generated (INVEN01)">
        </div>
      </div>
      <div class="form-group">
        <label for="categoryDescription">Description:</label>
        <textarea id="categoryDescription" placeholder="Category description" rows="2"></textarea>
      </div>
    </div>

    <!-- Second Row: Cost, Quantity, Unit Price -->
    <div class="form-row-three">
      <div class="form-group">
        <label for="newTotalCost">Total Cost (GHc):</label>
        <input type="number" id="newTotalCost" step="0.01" placeholder="0.00" oninput="calculateUnitPrice()">
      </div>
      <div class="form-group">
        <label for="newQuantity">Quantity:</label>
        <input type="number" id="newQuantity" step="1" placeholder="0" oninput="calculateUnitPrice()">
      </div>
      <div class="form-group">
        <label for="newUnitPrice">Unit Price (GHc):</label>
        <input type="number" id="newUnitPrice" step="0.01" readonly placeholder="0.00">
      </div>
    </div>

    <button type="submit" class="submit-btn">
      <i class="fas fa-plus"></i> Add Inventory
    </button>
  </form>
</div>

<!-- Modal for Messages -->
<div class="modal" id="messageModal" style="display: none;">
  <div class="modal-content">
    <div id="modalMessage"></div>
    <button class="modal-close-btn" onclick="closeInventoryModal()">Close</button>
  </div>
</div>

<!-- Loading Modal -->
<div class="inventory-loading-modal" id="inventoryLoadingModal" style="display: none;">
  <div class="loading-modal-content">
    <div class="loading-spinner"></div>
    <p>Processing...</p>
  </div>
</div>
