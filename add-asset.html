<div class="asset-container">
  <div class="asset-header">
    <h1>Add New Fixed Asset</h1>
  </div>

  <!-- New Asset Form -->
  <form id="newAssetForm" onsubmit="event.preventDefault(); submitNewAsset();">
    <div class="form-row-two">
      <div class="form-group">
        <label for="assetType">Asset Type:</label>
        <select id="assetType" onchange="handleAssetTypeChange()">
          <option value="">Select Asset Type</option>
          <option value="Computers & Accessories">Computers & Accessories</option>
          <option value="Furniture and Fixtures">Furniture and Fixtures</option>
          <option value="Office Equipment">Office Equipment</option>
          <option value="Software">Software</option>
          <option value="Fittings">Fittings</option>
          <option value="Motor Vehicle">Motor Vehicle</option>
        </select>
      </div>

      <div class="form-group">
        <label for="dateOfPurchase">Date of Purchase:</label>
        <input type="date" id="dateOfPurchase">
      </div>
    </div>

    <div class="form-row-two">
      <div class="form-group">
        <label for="assetCode">Asset Code:</label>
        <input type="text" id="assetCode" readonly placeholder="Auto-generated">
      </div>

      <div class="form-group">
        <label for="assetName">Name of Asset:</label>
        <input type="text" id="assetName" placeholder="e.g., Dell Laptop">
      </div>
    </div>

    <div class="form-row-two">
      <div class="form-group">
        <label for="assetCost">Cost of Asset (GHc):</label>
        <input type="number" id="assetCost" step="0.01" placeholder="0.00">
      </div>

      <div class="form-group">
        <label for="assetLocation">Location:</label>
        <input type="text" id="assetLocation" placeholder="e.g., Office, Store Room">
      </div>
    </div>

    <!-- Depreciation Info (Read-only) -->
    <div class="depreciation-info" id="depreciationInfo" style="display: none;">
      <div class="info-header">
        <i class="fas fa-chart-line"></i> Depreciation Information
      </div>
      <div class="info-grid">
        <div class="info-item">
          <label>Life Span:</label>
          <span id="lifeSpanDisplay">-</span>
        </div>
        <div class="info-item">
          <label>Depreciation Rate:</label>
          <span id="rateDisplay">-</span>
        </div>
        <div class="info-item">
          <label>Monthly Depreciation:</label>
          <span id="monthlyDepDisplay">-</span>
        </div>
        <div class="info-item">
          <label>Annual Charge:</label>
          <span id="annualChargeDisplay">-</span>
        </div>
        <div class="info-item">
          <label>End of Life Span:</label>
          <span id="endOfLifeDisplay">-</span>
        </div>
      </div>
    </div>

    <button type="submit" class="submit-btn">
      <i class="fas fa-plus"></i> Add Asset
    </button>
  </form>
</div>

<!-- Modal for Messages -->
<div class="modal" id="messageModal" style="display: none;">
  <div class="modal-content">
    <div id="modalMessage"></div>
    <button class="modal-close-btn" onclick="closeAssetModal()">Close</button>
  </div>
</div>
